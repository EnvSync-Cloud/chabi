[package]
name = "chabi-redis-handler"
version = "0.1.0"
edition = "2021"
description = "Redis protocol handler for Chabi"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
tokio-util = { version = "0.7", features = ["codec"] }
bytes = "1.0"
thiserror = "1.0"
tracing = "0.1"
chabi-core = { path = "../chabi-core" }
futures = "0.3"