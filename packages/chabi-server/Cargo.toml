[package]
name = "chabi-server"
version = "0.1.0"
edition = "2024"

[dependencies]
chabi-core = { path = "../chabi-core" }
tokio = { version = "1", features = ["full"] }
anyhow = "1"
log = "0.4"
env_logger = "0.10"
thiserror = "1.0"
clap = "3.0"
# HTTP server
axum = "0.6"
tower-http = { version = "0.4", features = ["cors", "trace"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
# Tracing for HTTP requests
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[profile.release]
opt-level = 3