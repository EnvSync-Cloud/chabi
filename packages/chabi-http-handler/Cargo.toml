[package]
name = "chabi-http-handler"
version = "0.1.0"
edition = "2021"
description = "HTTP endpoint handler for Chabi"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
axum = "0.7"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
thiserror = "1.0"
chabi-core = { path = "../chabi-core" }