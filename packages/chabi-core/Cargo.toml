[package]
name = "chabi-core"
version = "0.1.0"
edition = "2021"
description = "Core functionality for Chabi - A Redis Alternative"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
tokio-util = { version = "0.7", features = ["codec"] }
bytes = "1.0"
thiserror = "1.0"
tracing = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
futures = "0.3"
rand = "0.8"
ordered-float = { version = "4", features = ["serde"] }