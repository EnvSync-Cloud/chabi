[package]
name = "chabi-core"
version = "0.1.0"
edition = "2024"

[lib]
path = "src/lib.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
dashmap = "5"
bytes = "1"
tokio-util = "0.7"
futures = "0.3"
anyhow = "1"
async-trait = "0.1"
memmap2 = "0.5"
serde = { version = "1", features = ["derive"] }
bincode = "1.3"
chrono = { version = "0.4", features = ["serde"] }
parking_lot = "0.12"
regex = "1.11.2"
uuid = { version = "1", features = ["v4", "serde"] }