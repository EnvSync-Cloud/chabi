name: Benchmarks

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  membench:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install netcat
        run: sudo apt-get update && sudo apt-get install -y netcat-openbsd

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Build server
        run: cargo build -p chabi-server --release

      - name: Start server
        run: |
          REDIS_PORT=6380 HTTP_PORT=8081 target/release/chabi-server &
          echo $! > server.pid
          for i in {1..100}; do nc -z 127.0.0.1 6380 && break; sleep 0.2; done

      - name: Run membench
        working-directory: apps/membench
        run: go run main.go benchmark --database redis --host 127.0.0.1 --port 6380 --num-requests 20000 --num-clients 4

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then kill $(cat server.pid) || true; fi