name: Release Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            binary_name: chabi-server-linux-amd64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            binary_name: chabi-server-linux-arm64
          - target: x86_64-apple-darwin
            runner: macos-latest
            binary_name: chabi-server-macos-amd64
          - target: aarch64-apple-darwin
            runner: macos-latest
            binary_name: chabi-server-macos-arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure linker (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml <<EOF
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p chabi-server

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/chabi-server dist/${{ matrix.binary_name }}
          cd dist
          tar czf ${{ matrix.binary_name }}.tar.gz ${{ matrix.binary_name }}

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.binary_name }}.tar.gz
